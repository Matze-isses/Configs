
# Sizing keys
bind = SUPER, i, invertactivewindow

binde = SUPER, Equal, exec, pamixer -i 1
binde = SUPER, Minus, exec, pamixer -d 1

binde = SUPER, 1, focusworkspaceoncurrentmonitor, main
binde = SUPER, 2, focusworkspaceoncurrentmonitor, 2
binde = SUPER, 3, focusworkspaceoncurrentmonitor, 3
binde = SUPER, 4, focusworkspaceoncurrentmonitor, 4
binde = SUPER, 5, focusworkspaceoncurrentmonitor, 5

$one = hyprctl hyprpaper wallpaper "DP-1, /home/admin/WallPapers/mandelbrot_green.png"

 bind = ALT,      a, execr, wtype -P \0x00E4 -p \0x00E4 # ä
# bind = SHIFTALT, A, exec, wtype -P \0x00c4 -p \0x00c4 # Ä
# bind = ALT,      o, exec, wtype -P \0x00F6 -p \0x00F6 # ö
# bind = SHIFTALT, O, exec, wtype -P \0x00d6 -p \0x00d6 # Ö
# bind = ALT,      u, exec, wtype -P \0x00Fc -p \0x00Fc # ü 
# bind = SHIFTALT, U, exec, wtype -P \0x00dc -p \0x00dc # Ü
# bind = ALT,      s, exec, wtype -P \0x00DF -p \0x00DF # ß

bind = SUPERALT, 1, exec, hyprctl hyprpaper wallpaper "DP-1, /home/admin/WallPapers/start.png"
bind = SUPERALT, 2, exec, hyprctl hyprpaper wallpaper "DP-1, /home/admin/WallPapers/rocket.png"
bind = SUPERALT, 3, exec, hyprctl hyprpaper wallpaper "DP-1, /home/admin/WallPapers/gray_tower.png"


bind = SUPER, G, fullscreen
bind = SUPER, S, exec, hyprpicker -a -f hex  # autocopies color in hex

# source = ~/configs/hyprland/keymap_dwindel.conf

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = SUPER,       Q, killactive, 
bind = SUPER,       SPACE, togglespecialworkspace, main

bind = SUPER,       d, movetoworkspace, name:main
bind = SUPER,       u, movetoworkspace, special:main

bind = SUPER,       v, exec, hyprctl dispatch focusmonitor HDMI-A-1
bind = SUPER,       m, exec, hyprctl dispatch focusmonitor DP-1

bind = SUPER_SHIFT, V, movetoworkspace, vert
bind = SUPER_SHIFT, M, movetoworkspace, main

bind = SUPERSHIFT, f, togglefloating

bind = SUPER, O, exec, nohup kitty --hold sh -c 'neofetch' -o allow_remote_control=yes --listen-on unix:/tmp/mykitty
bind = SUPER, N, exec, neovide -- --listen /tmp/myNvim && sleep 0.1 && hyprctl dispatch fullscreen && hyprctl dispatch fullscreen
bind = SUPER, C, exec, google-chrome-stable --enable-features=UseOzonePlatform --ozone-platform=wayland
