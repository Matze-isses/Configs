
# Sizing keys
bind = CTRL_R & SUPER, 1,sendshortcut,                 ,F1             ,^(com.obsproject.Studio)$
bind = CTRL_R & SUPER, 2,sendshortcut,                 ,F2             ,^(com.obsproject.Studio)$
bind = CTRL_R & SUPER, 3,sendshortcut,                 ,F3             ,^(com.obsproject.Studio)$
bind = CTRL_R & SUPER, 4,sendshortcut,                 ,F4             ,^(com.obsproject.Studio)$
bind = CTRL_R & SUPER, 5,sendshortcut,                 ,F5             ,^(com.obsproject.Studio)$
bind = CTRL_R & SUPER, 6,sendshortcut,                 ,F6             ,^(com.obsproject.Studio)$
bind = SUPERALT,    Equal,sendshortcut,     SHIFT_CTRL  ,=              ,^(com.obsproject.Studio)$
bind = SUPERALT,    Minus,sendshortcut,     SHIFT_CTRL  ,-              ,^(com.obsproject.Studio)$
bind = SUPERALT,        s,sendshortcut,     CTRL        ,s              ,^(com.obsproject.Studio)$
bind = SUPERALT,        h,sendshortcut,     SHIFT_CTRL  ,s              ,^(com.obsproject.Studio)$

bind  = SUPERSHIFT, O, exec, kitty --title "Console" -o allow_remote_control=yes --listen-on unix:/tmp/mykitty > /dev/null 2>&1

bind  = SUPERSHIFT, S, exec, ~/configs/hyprland/skripts/screenshots.sh

#bind  = SUPERCTRL, H, changemonitor, +1
#bind  = SUPERCTRL, L, changemonitor, -1 

binde = SUPER,  Equal, exec, pamixer -i 1
binde = SUPER,  Minus, exec, pamixer -d 1

bind  = SUPER, Z, exec, /home/admin/configs/hyprland/skripts/screenshot_to_drive.sh

# bind = SUPER, i, invertactivewindow
bind  = SUPER,      V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind  = SUPER,      F, exec, hyprpicker -a -f hex  # autocopies color in hex
bind  = SUPER,      E, exec, thunar
bind  = SUPERSHIFT, E, exec, dolphin 
bind  = SUPER,      R, exec, tofi-drun

bind  = SUPER,      O, exec, nohup kitty -o "linux_display_server=x11" --hold sh -c 'neofetch' -o allow_remote_control=yes --listen-on unix:/tmp/mykitty

bind  = SUPER,      N, exec, env -u WAYLAND_DISPLAY neovide --vsync -- --listen /home/admin/.cache/nvim/server.pipe
bind  = SUPERSHIFT, N, exec, neovide --vsync -- --server 127.0.0.1:6666

# bind  = SUPER,      C, exec, /home/admin/.conda/envs/serv/bin/python /home/admin/projects/custom_browser/annoying_yt.py 
bind  = SUPER, C, exec, google-chrome-stable

bind  = SUPER,         s, exec, hyprctl dispatch tagwindow see

bind  = SUPERSHIFT,    F, togglefloating
bind  = SUPER,         G, fullscreen
bind  = SUPER,         Q, killactive
bind  = SUPER,     SPACE, togglespecialworkspace, -1

bind  = SUPER,         1, workspace, 1
bind  = SUPER,         2, workspace, 2
bind  = SUPER,         3, workspace, 3

bind  = SUPER,         8, workspace, 4
bind  = SUPER,         9, workspace, 5
bind  = SUPER,         0, workspace, 6

bind = SUPER, M, exec, pypr layout_center toggle # toggle the layout
bind = SUPER, up, exec, pypr layout_center prev
bind = SUPER, down, exec, pypr layout_center next

bind = SUPER, B, exec, pypr expose
workspace = special:exposed,gapsout:60,gapsin:30,bordersize:5,border:true,shadow:false


bind  = SUPER,        t, tagwindow, +no_darken

bind = SUPER,         U, movetoworkspace,   special:-1
bind = SUPER,         D, movetoworkspace,   1

bind  = SUPERSHIFT,    1, movetoworkspace, 1
bind  = SUPERSHIFT,    2, movetoworkspacesilent, 2
bind  = SUPERSHIFT,    3, movetoworkspacesilent, 3

bind  = SUPERSHIFT,    8, movetoworkspace, 4
bind  = SUPERSHIFT,    9, movetoworkspacesilent, 5
bind  = SUPERSHIFT,    0, movetoworkspacesilent, 6
bind = SUPER, a, exec, ~/configs/hyprland/skripts/shot_to_anki.sh n


$one = hyprctl hyprpaper wallpaper "DP-1, /home/admin/WallPapers/mandelbrot_green.png"

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow


bind = SUPERSHIFT, a,     submap,                 anki

submap=anki
    bind = SUPER, a, exec, ~/configs/hyprland/skripts/shot_to_anki.sh n

    bind = SUPER, f, exec, ~/configs/hyprland/skripts/shot_to_anki.sh q
    bind = SUPER, a, exec, ~/configs/hyprland/skripts/shot_to_anki.sh a

    bind = SUPER, t, exec, ~/configs/hyprland/skripts/shot_to_anki.sh t
    bind = SUPER, b, exec, ~/configs/hyprland/skripts/shot_to_anki.sh b
    bind = , escape,     submap,                 reset
    bind = , c,          submap,                 reset
submap=reset


