
# Move focus with mainMod + arrow keys
bind = SUPER,      k,       scroller:movefocus, u
bind = SUPER,      j,       scroller:movefocus, d
bind = SUPER,      f,       scroller:fitsize, active

bind = SUPER,      h,       scroller:movefocus, l
bind = SUPER,      l,       scroller:movefocus, r

bind = SUPER,      up,      scroller:cyclesize, next
bind = SUPER,      down,    scroller:cyclesize, prev

binde = SUPER,     right,   resizeactive, 10 0
binde = SUPER,     left,    resizeactive, -10 0

bind = SUPER,      t,       scroller:admitwindow,
bind = SUPER,      w,       scroller:expelwindow,

# Sizing keys
bind = SUPERSHIFT, l, scroller:movewindow, r
bind = SUPERSHIFT, h, scroller:movewindow, l
bind = SUPERSHIFT, j, scroller:movewindow, d
bind = SUPERSHIFT, k, scroller:movewindow, u

bind = SUPER, bracketright, scroller:expelwindow,
bind = SUPER, bracketleft, scroller:admitwindow,

bind=  SUPER,      c, submap,        centered

bind = SUPER,      v,     exec, hyprctl dispatch focusmonitor HDMI-A-1
bind = SUPER_SHIFT, V,     movetoworkspace, vert
bind = SUPER,      m,     exec, hyprctl dispatch focusmonitor DP-1
bind = SUPER_SHIFT, M,     movetoworkspace, main

bind = SUPER,      U,     movetoworkspace, special:main
bind = SUPER,      D,     movetoworkspace, name:main

submap=centered
    bind = SUPER, l, scroller:movefocus, r 
    bind = SUPER, h, scroller:movefocus, l

    bind = SUPER, l, scroller:alignwindow, c
    bind = SUPER, h, scroller:alignwindow, c

    bind = SUPER, l, exec, hyprctl dispatch forcerenderreload
    bind = SUPER, h, exec, hyprctl dispatch forcerenderreload

    bind = SUPER, SPACE, togglespecialworkspace, 2

    bind = SUPER, c,     submap,                 reset
submap=reset
