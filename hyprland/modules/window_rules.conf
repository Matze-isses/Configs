
# DLR Simulation
windowrule = monitor HDMI-A-1,  ^(CarlaUE4-Linux-Shipping)$
windowrule = tile,              ^(CarlaUE4-Linux-Shipping)$
windowrule = noinitialfocus,    ^(CarlaUE4-Linux-Shipping)$

windowrule = noblur, ^(kitty)$


windowrulev2 = opacity 1, title:(Console)
windowrulev2 = workspace name:vert, title:(Console)

windowrulev2 = noblur,          title:(SeeThrow)

# windowrule = unset,                  ^(neovide)$
#windowrule = workspace special:main, ^(neovide)$
#windowrule = opacity 1 0.4 0.1,      ^(neovide)$
#windowrule = focusonactivate,        ^(neovide)$

windowrule = opacity 1 0.7 0.1,     ^(kitty)$
windowrule = focusonactivate,       ^(kitty)$
windowrule = workspace special:main,     ^(kitty)$

windowrule = opacity 1 override 0.9 override,^(Google-chrome)$
windowrule = opacity 1 override 0.9 override,^(Google-chrome)$


bind = SUPERSHIFT,       c, exec, kitty --title "Console" -o allow_remote_control=yes --listen-on unix:/tmp/mykitty > /dev/null 2>&1
bind = SUPER SHIFT,      S, exec, ~/configs/hyprland/skripts/screenshots.sh

bind = SUPER, O, exec, nohup kitty --hold sh -c 'neofetch' -o allow_remote_control=yes --listen-on unix:/tmp/mykitty 
bind = SUPER, N, exec, neovide -- --listen /tmp/myNvim
bind = SUPER, E, exec, thunar
bind = SUPER, R, exec, tofi-drun


