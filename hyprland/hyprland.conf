# # See https://wiki.hyprland.org/Configuring/Monitors/

monitor=HDMI-A-1,2560x1080, 0x0, 1, transform,1
monitor=DP-1, 5120x1440@143.97900, 1080x1120, 1
# monitor=DP-2, 1920x1080@59.94000, 1000x-1920, 1

# monitor=HDMI-A-1, 2560x1080@59.97800, 0x1080, 1
# monitor=DP-1, 5120x1440@143.97900, 2560x1080, 1
# monitor=DP-2, 1920x1080@59.94000, 1000x0, 1

# monitor=DP-2, 1920x1080@59.94, 0x0, 1
# monitor=DP-3, 1920x1080@59.94, 1920x0, 1
# monitor=HDMI-A-1, 2560x1080@59.97800, 3840x0, 1
# monitor=DP-1, 1920x1080@59.94, 6400x0, 1


source = ~/configs/hyprland/modules/colors.conf
source = ~/configs/hyprland/modules/auto_start.conf
exec-once = hyprpm reload -n
# Some default env vars.
#env = HYPRCURSOR_THEME,HyprBibataModernClassicSVG
#env = HYPRCURSOR_SIZE,24
# exec-once = xprop -root -f _XWAYLAND_GLOBAL_OUTPUT_SCALE 32c -set _XWAYLAND_GLOBAL_OUTPUT_SCALE 1


input {
    kb_layout = us,de
    kb_variant =
    kb_model = 
    kb_options = 
    kb_rules =

    repeat_rate = 60
    repeat_delay = 350

    follow_mouse = 1
    repeat_rate = 60
    repeat_delay = 350

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}


general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 10
    gaps_out = 15
    border_size = 3
    col.active_border = $active $active $mid_active $mid_active $mid_active $mid_active $mid_active $before_end_active $end_active 20deg
    col.inactive_border = $inactive $inactive $inactive $mid_inactive $mid_inactive $inactive $end_inactive $end_inactive 20deg

    resize_on_border = false
    # layout = dwindle
    # layout = hy3
    layout = scroller
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 6

    dim_special = 0.1

    blur {

        enabled = true
        size =  6
        passes = 4
        new_optimizations = true
        noise = 0.05

        vibrancy = 0.01
        vibrancy_darkness = 1.0

        contrast = 1.5
        brightness = 0.7

        special = false
    }

    drop_shadow = true
    shadow_range = 5
    shadow_render_power = 5
    col.shadow = rgba(1a1a1aee)
}


animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.50, 0.01, 0.50, 1
    bezier = overshot, 0.50, 1.40, 0.75, 0.95
    bezier = bordercurve, 0.07, -1.01, 1, 2.01
    bezier = belowabove,  0.6, -0.35, 0.2, 1.3 
    
    animation = windows,    1, 5,  myBezier, popin 50%
    animation = windowsIn,  1, 6,  myBezier, popin 10%
    animation = windowsOut, 1, 6,  myBezier, popin 50%
    animation = windowsMove, 1, 6,  myBezier, popin 50%

    animation = fadeIn,     1, 9, myBezier
    animation = fadeOut,    1, 5, myBezier
    animation = fadeSwitch, 1, 6, myBezier
    animation = fadeShadow, 1, 5, myBezier
    animation = fadeDim,    1, 5, myBezier

    animation = fadeLayersIn,    1, 3, myBezier
    animation = fadeLayersOut,   1, 3, myBezier


    animation = border,      1, 5, overshot
    animation = borderangle, 1, 50, overshot, once

    animation = workspaces,  1, 8, myBezier, slidefade 
    animation = specialWorkspace,  1, 5, myBezier, slidefadevert 80%
    # animation = workspaces,  1, 6, overshot, fade
}


dwindle {
     smart_resizing = false
     smart_split = false
     pseudotile = false
     use_active_for_splits = false
     preserve_split = true
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
    inherit_fullscreen = false
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more

misc {
    disable_hyprland_logo = true
    new_window_takes_over_fullscreen = 1
    mouse_move_enables_dpms = false
    render_ahead_of_time = false
}

opengl {
    nvidia_anti_flicker = true 
}

group:groupbar {
    enabled = true
    height = 20
}

plugin{ 
    hyprfocus {
        enabled = yes

        keyboard_focus_animation = shrink
        mouse_focus_animation = flash

        bezier = bezIn, 0.5,0.0,1.0,0.5
        bezier = bezOut, 0.0,0.5,0.5,1.0

        flash {
            flash_opacity = 0.7

            in_bezier = bezIn
            in_speed = 0.5

            out_bezier = myBezier
            out_speed = 5
        }
    }
  hy3 {
    enabled = true
        no_gaps_when_only = 0
        node_collapse_policy = 2 # default: 2
        group_inset = 10 # default: 10
        tab_first_window =  false
       
        tabs {
            height = 5 # default: 15
            padding = 5 # default: 5
            from_top = false # default: false
       
            rounding = 3  # default: 3
            render_text = false # default: true
            text_center = false # default: false
            text_font = Sans # default: Sans
            text_height = 8 # default: 8
            text_padding = 3  # default: 3
       
            col.active = 0xff32b4ff # default: 0xff32b4ff
            col.urgent = 0xff32b4ff # default: 
            col.inactive = 0x808080800 # default: 0x808080800
            col.text.active = 0xff000000 # default: 0xff000000
            col.text.urgent = 0xff000000 # default: 0xff000000
            col.text.inactive = 0xff000000 # default: 0xff000000
        }
       
        # autotiling settings
        autotile {
            # enable autotile
            enable = true # default: false
            # make autotile-created groups ephemeral
            ephemeral_groups = true # default: true
            # if a window would be squished smaller than this width, a vertical split will be created
            # -1 = never automatically split vertically
            # 0 = always automatically split vertically
            # <number> = pixel height to split at
            trigger_width = -1 # default: 0
            # if a window would be squished smaller than this height, a horizontal split will be created
            # -1 = never automatically split horizontally
            # 0 = always automatically split horizontally
            # <number> = pixel height to split at
            trigger_height = -1 # default: 0
            # a space or comma separated list of workspace ids where autotile should be enabled
            # it's possible to create an exception rule by prefixing the definition with "not:"
            # workspaces = 1,2 # autotiling will only be enabled on workspaces 1 and 2
            # workspaces = not:1,2 # autotiling will be enabled on all workspaces except 1 and 2
            workspaces = all # default: all
        }
    }
}

plugin {
    scroller {
        column_default_width = half
        focus_wrap = true
    }
}
source = /home/admin/configs/hyprland/modules/window_rules.conf
source = /home/admin/configs/hyprland/keymap/defaults.conf
source = /home/admin/configs/hyprland/keymap/keymap_scroller.conf

source = ~/configs/hyprland/modules/nvidea_workaurounds.conf
