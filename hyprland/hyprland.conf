# # See https://wiki.hyprland.org/Configuring/Monitors/

monitor=HDMI-A-1,2560x1080, 0x0, 1, transform,1
monitor=DP-1, 5120x1440@143.97900, 1080x1120, 1
# monitor=DP-2, 1920x1080@59.94000, 1000x-1920, 1

# monitor=HDMI-A-1, 2560x1080@59.97800, 0x1080, 1
# monitor=DP-1, 5120x1440@143.97900, 2560x1080, 1
# monitor=DP-2, 1920x1080@59.94000, 1000x0, 1

# monitor=DP-2, 1920x1080@59.94, 0x0, 1
# monitor=DP-3, 1920x1080@59.94, 1920x0, 1
# monitor=HDMI-A-1, 2560x1080@59.97800, 3840x0, 1
# monitor=DP-1, 1920x1080@59.94, 6400x0, 1

source = ~/configs/hyprland/modules/colors.conf
source = ~/configs/hyprland/modules/auto_start.conf
# Some default env vars.
#env = HYPRCURSOR_THEME,HyprBibataModernClassicSVG
#env = HYPRCURSOR_SIZE,24

exec-once = hyprpm reload -n

plugin = ~/configs/hyprland/plugins/hyprfocus/

input {
    kb_layout = us,de
    kb_variant =
    kb_model = 
    kb_options = 
    kb_rules =

    repeat_rate = 60
    repeat_delay = 350

    follow_mouse = 1
    repeat_rate = 60
    repeat_delay = 350

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}


general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 10
    gaps_out = 15
    border_size = 3
    col.active_border = $active $active $mid_active $mid_active $mid_active $mid_active $mid_active $before_end_active $end_active 20deg
    col.inactive_border = $inactive $inactive $inactive $mid_inactive $mid_inactive $inactive $end_inactive $end_inactive 20deg

    resize_on_border = false
    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 6

    dim_special = 0.1

    blur {

        enabled = true
        size =  6
        passes = 4
        new_optimizations = true
        noise = 0.05

        vibrancy = 0.01
        vibrancy_darkness = 1.0

        contrast = 1.5
        brightness = 0.7

        special = false
    }

    drop_shadow = true
    shadow_range = 5
    shadow_render_power = 5
    col.shadow = rgba(1a1a1aee)
}


animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.50, 0.01, 0.50, 1
    bezier = overshot, 0.50, 1.40, 0.75, 0.95
    bezier = bordercurve, 0.07, -1.01, 1, 2.01
    bezier = belowabove,  0.6, -0.35, 0.2, 1.3 
    
    animation = windows,    1, 5,  myBezier, popin 50%
    animation = windowsIn,  1, 6,  myBezier, popin 10%
    animation = windowsOut, 1, 6,  myBezier, popin 50%

    animation = fadeIn,     1, 9, myBezier
    animation = fadeOut,    1, 5, myBezier
    animation = fadeSwitch, 1, 6, myBezier
    animation = fadeShadow, 1, 1, myBezier
    animation = fadeDim,    1, 1, myBezier


    animation = border,      1, 5, overshot
    animation = borderangle, 1, 50, overshot, once

    animation = workspaces,  1, 8, myBezier, slidefade
    animation = workspaces,  1, 4, overshot, slide
    animation = workspaces,  1, 6, overshot, fade
}


dwindle {
     smart_resizing = false
     smart_split = false
     pseudotile = false
     use_active_for_splits = false
     preserve_split = true
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
    inherit_fullscreen = false
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more

misc {
    disable_hyprland_logo = true
    new_window_takes_over_fullscreen = 1
    mouse_move_enables_dpms = false
    render_ahead_of_time = false
}

opengl {
    nvidia_anti_flicker = true 
}

plugin:hyprfocus {

    keyboard_focus_animation = shrink
    mouse_focus_animation = flash

    bezier = bezIn, 0.5,0.0,1.0,0.5
    bezier = bezOut, 0.0,0.5,0.5,1.0

    flash {
        flash_opacity = 1.0

        in_bezier = bezIn
        in_speed = 0.5

        out_bezier = bezOut
        out_speed = 3
    }

    shrink {
        shrink_percentage = 0.8

        in_bezier = bezIn
        in_speed = 0.5

        out_bezier = bezOut
        out_speed = 3
    }
}

workspace=name:main,monitor:DP-1
workspace=special:main,monitor:DP-1

#wsbind=main,DP-1
bind = SUPER, SPACE, togglespecialworkspace, main
bind = SUPER, D, movetoworkspace, 2
bind = SUPER, U, movetoworkspace, special:main


$mainMod = SUPER
$one = hyprctl hyprpaper wallpaper "DP-1, /home/admin/WallPapers/mandelbrot_green.png"

# DLR Simulation
windowrule = monitor HDMI-A-1, ^(CarlaUE4-Linux-Shipping)$
windowrule = tile, ^(CarlaUE4-Linux-Shipping)$
windowrule = noinitialfocus, ^(CarlaUE4-Linux-Shipping)$

windowrule = noblur, ^(kitty)$
# windowrule = noblur, ^(neovide)$
#windowrulev2 = tile,nofullscreenrequest, class:neovide

windowrulev2 = noblur, title:(SeeThrow)

windowrule = unset,^(neovide)$
windowrule = workspace special:main, ^(neovide)$
windowrule = opacity 1 override 0.4 override,^(neovide)$

bind = $mainMod SHIFT, S, exec, ~/configs/hyprland/skripts/screenshots.sh

windowrule = opacity 1 override 0.4 override,^(kitty)$
windowrule = workspace special:main, ^(kitty)$

windowrule = opacity 1 override 0.9 override,^(Google-chrome)$
windowrule = opacity 1 override 0.9 override,^(Google-chrome)$

binde = SUPER, Equal, exec, pamixer -i 1
binde = SUPER, Minus, exec, pamixer -d 1

binde = SUPER, left,  splitratio, 0.01 -0.01
binde = SUPER, right, splitratio, -0.01 0.01 

bind = $mainMod, O, exec, nohup kitty --hold sh -c 'neofetch' -o allow_remote_control=yes --listen-on unix:/tmp/mykitty 
bind = $mainMod, N, exec, neovide -- --listen /tmp/myNvim

windowrule = suppressevent maximize activatefocus,^(neovide)$

bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, thunar
bind = $mainMod, R, exec, tofi-drun

bind = ALT,      a, execr, wtype -P \0x00E4 -p \0x00E4 # ä
bind = SHIFTALT, A, exec, wtype -P \0x00c4 -p \0x00c4 # Ä
bind = ALT,      o, exec, wtype -P \0x00F6 -p \0x00F6 # ö
bind = SHIFTALT, O, exec, wtype -P \0x00d6 -p \0x00d6 # Ö
bind = ALT,      u, exec, wtype -P \0x00Fc -p \0x00Fc # ü 
bind = SHIFTALT, U, exec, wtype -P \0x00dc -p \0x00dc # Ü
bind = ALT,      s, exec, wtype -P \0x00DF -p \0x00DF # ß

bind = SUPERALT, 1, exec, hyprctl hyprpaper wallpaper "DP-1, /home/admin/WallPapers/start.png"
bind = SUPERALT, 2, exec, hyprctl hyprpaper wallpaper "DP-1, /home/admin/WallPapers/rocket.png"
bind = SUPERALT, 3, exec, hyprctl hyprpaper wallpaper "DP-1, /home/admin/WallPapers/gray_tower.png"

bind = $mainMod, F, togglefloating
bind = $mainMod, G, fullscreen
bind = $mainMod, V, centerwindow

bind = $mainMod, S, exec, hyprpicker -a -f hex  # autocopies color in hex

bind = SUPER_SHIFT, h, movewindow, l
bind = SUPER_SHIFT, l, movewindow, r
bind = SUPER_SHIFT, k, movewindow, u
bind = SUPER_SHIFT, j, movewindow, d

# Move focus with mainMod
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

source = ~/configs/hyprland/modules/nvidea_workaurounds.conf
