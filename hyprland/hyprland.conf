# # See https://wiki.hyprland.org/Configuring/Monitors/

# monitor=HDMI-A-1,-2560x0, 0x0, 1
monitor=HDMI-A-1,2560x1080, 1480x0, 1, transform,1

monitor=DP-1, highres, 2560x0, 1

# monitor=HDMI-A-1, 2560x1080@59.97800, 0x1080, 1
# monitor=DP-1, 5120x1440@143.97900, 2560x1080, 1
# monitor=DP-2, 1920x1080@59.94000, 1000x0, 1

# monitor=DP-2, 1920x1080@59.94, 0x0, 1
# monitor=DP-3, 1920x1080@59.94, 1920x0, 1
# monitor=HDMI-A-1, 2560x1080@59.97800, 3840x0, 1
# monitor=DP-1, 1920x1080@59.94, 6400x0, 1


source = ~/configs/hyprland/modules/colors.conf
source = ~/configs/hyprland/modules/auto_start.conf

env = WLR_DRM_NO_ATOMIC,1

# Some default env vars.
#env = HYPRCURSOR_THEME,HyprBibataModernClassicSVG
#env = HYPRCURSOR_SIZE,24
# exec-once = xprop -root -f _XWAYLAND_GLOBAL_OUTPUT_SCALE 32c -set _XWAYLAND_GLOBAL_OUTPUT_SCALE 1


input {
    kb_layout = us,de
    kb_variant =
    kb_model = 
    kb_options = 
    kb_rules =

    natural_scroll = false
    follow_mouse = 2
    repeat_rate = 65 
    repeat_delay = 350

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0
    mouse_refocus = true
    off_window_axis_events = 1
    float_switch_override_focus = 0
    special_fallthrough = false 

}



decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 6

    dim_special = 0.05
    dim_around = 0.1


    blur {
        enabled = true
        size =  6
        passes = 4
        new_optimizations = true
        noise = 0.05

        vibrancy = 0.01
        vibrancy_darkness = 1.0

        contrast = 1.5
        brightness = 0.7

        special = false
    }

    drop_shadow = true

    shadow_range = 30
    shadow_render_power = 5
    shadow_scale = 1
    shadow_offset = -3, 2

    col.shadow = $shadow
    col.shadow_inactive = $shadow_inactive
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 15
    gaps_out = 30
    gaps_workspaces = 15
    border_size = 3
    col.active_border   = $active $before_end_active $mid_active $mid_active $highlight $mid_active $mid_active $mid_active $before_end_active $end_active 25deg
    col.inactive_border = $inactive $inactive $inactive $mid_inactive $mid_inactive $inactive $end_inactive $end_inactive 20deg

    col.nogroup_border = $end_inactive $end_inactive 20deg
    col.nogroup_border_active = $end_inactive $end_inactive 20deg

    layout = dwindle
    # layout = master
    #layout = hy3
    # layout = scroller

    allow_tearing = true
    resize_on_border = false
    no_focus_fallback = true
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.50, 0.01, 0.50, 1
    bezier = overshot, 0.50, 1.40, 0.75, 0.95
    bezier = bordercurve, 0.07, -1.01, 1, 2.01
    bezier = belowabove,  0.6, -0.35, 0.2, 1.3 
    
    animation = windows,    1, 5,  myBezier, popin 50%
    animation = windowsIn,  1, 6,  myBezier, popin 10%
    animation = windowsOut, 1, 6,  myBezier, popin 50%
    animation = windowsMove, 1, 6,  myBezier, popin 50%

    animation = fadeIn,     1, 9, myBezier
    animation = fadeOut,    1, 5, myBezier
    animation = fadeSwitch, 1, 6, myBezier
    animation = fadeShadow, 1, 5, myBezier
    animation = fadeDim,    1, 5, myBezier

    animation = fadeLayersIn,    1, 3, myBezier
    animation = fadeLayersOut,   1, 3, myBezier

    animation = border,      1, 5, overshot
    animation = borderangle, 1, 300, myBezier, once 

    animation = workspaces,        1, 7, myBezier, slidefadevert
    animation = specialWorkspace,  1, 4, myBezier, slidefadevert 80%
    # animation = workspaces,  1, 6, overshot, fade
}


dwindle {
     smart_resizing = false
     smart_split = false 
     pseudotile = false
     use_active_for_splits = false
     preserve_split = false 
}


gestures {
    workspace_swipe = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more

misc {
    animate_manual_resizes = true
    disable_hyprland_logo = true

    new_window_takes_over_fullscreen = 1
    initial_workspace_tracking = 0

    focus_on_activate = false

    close_special_on_empty = true
    mouse_move_focuses_monitor = false 
    mouse_move_enables_dpms = false
    render_ahead_of_time = false

    vrr = 1
}

binds {
    movefocus_cycles_fullscreen = false
    focus_preferred_method = 0
    pass_mouse_when_bound = true
    workspace_center_on = 0
    allow_workspace_cycles = true
    workspace_back_and_forth = true

    window_direction_monitor_fallback = true
}

cursor {
    default_monitor = DP-1
    no_warps =  false
    zoom_factor = 1.0
    inactive_timeout = 10
    enable_hyprcursor = true
    hide_on_key_press = true
}

opengl {
    nvidia_anti_flicker = true
    force_introspection = 2
}

group{ 
    focus_removed_window = true
    insert_after_current = true
    col.border_locked_active = $active 20def
    groupbar {
        enabled = true
        height = 20
    }
}

xwayland {
    force_zero_scaling = true
}


plugin {
    scroller {
        column_default_width = onehalf
        focus_wrap = true
    }
    split-monitor-workspaces{
        count = 2
    }
}

source = /home/admin/configs/hyprland/modules/window_rules.conf
source = /home/admin/configs/hyprland/modules/workspaces.conf

source = /home/admin/configs/hyprland/keymap/defaults.conf
source = /home/admin/configs/hyprland/keymap/dwindel.conf
# source = /home/admin/configs/hyprland/keymap/keymap_hy3.conf

source = ~/configs/hyprland/modules/nvidea_workaurounds.conf
